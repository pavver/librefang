# ── Browser Automation ───────────────────────────────────────
# [browser]
# headless = true
# viewport_width = 1280
# viewport_height = 720
# max_sessions = 5

# ── Docker Sandbox ───────────────────────────────────────────
# [docker]
# enabled = false
# image = "python:3.12-slim"
# memory_limit = "512m"
# timeout_secs = 60

# ── File Inbox (Async External Commands) ────────────────────
# Drop text files into a directory to send messages to agents.
# First line may contain `agent:<name>` to target a specific agent.
# [inbox]
# enabled = false
# directory = "~/.librefang/inbox/"   # Defaults to $HOME_DIR/inbox/
# poll_interval_secs = 5
# default_agent = "assistant"         # Agent to use when no agent: directive

# ── Network (P2P Federation) ─────────────────────────────────
# network_enabled = false
# [network]
# shared_secret = ""           # Required for P2P auth

# ── Editor Integration (ACP) ─────────────────────────────────
# LibreFang exposes an Agent Client Protocol (ACP) server so editors
# like Zed, VS Code, and JetBrains can embed a LibreFang agent
# natively. Editors spawn `librefang acp` as a child process.
#
# Two modes auto-select based on whether `librefang start` is running:
#   * In-process — fresh kernel per invocation, suitable for one-off use.
#   * Daemon-attached (Unix) — proxies stdio to ~/.librefang/acp.sock,
#     so multiple editor tabs share one kernel + agent state.
#
# No config keys are required. To configure your editor, see:
#   https://librefang.com/integrations/acp
#
# Zed (`~/.config/zed/settings.json`):
#   "agent_servers": {
#     "librefang": {
#       "command": "librefang",
#       "args": ["acp"]
#     }
#   }
