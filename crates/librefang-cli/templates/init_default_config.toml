# name = "bluesky"
# command = "python3"
# args = ["-m", "librefang.sidecar.adapters.bluesky"]
# channel_type = "bluesky"
# [sidecar_channels.env]
# BLUESKY_IDENTIFIER = "alice.bsky.social"
# BLUESKY_APP_PASSWORD = "..."  # xxxx-xxxx-xxxx-xxxx
