# ══════════════════════════════════════════════════════════════
# LibreFang Agent OS — Configuration
# Docs: https://docs.librefang.ai/configuration
# ══════════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────────
# Default is loopback-only. To expose on LAN/remote, FIRST configure
# authentication (set `api_key` below, configure `dashboard_user`/`dashboard_pass`,
# or define `[[users]]` with `api_key_hash`), THEN change `api_listen` to a
# non-loopback address. The daemon refuses to start on a non-loopback bind
# without configured auth — set `LIBREFANG_ALLOW_NO_AUTH=1` to override (not
# recommended; see https://docs.librefang.ai/security/network).
api_listen = "127.0.0.1:4545"
log_level = "info"             # trace | debug | info | warn | error
mode = "default"               # stable | default | dev
update_channel = "stable"      # stable | beta | rc

# ── Dashboard Login ───────────────────────────────────────────
# ⚠️  Change the default password after first login!
# Secure storage options:
#   1. Vault:   librefang vault set dashboard_password
#               dashboard_pass = "vault:dashboard_password"
#   2. Env var: LIBREFANG_DASHBOARD_PASS=your-secret
dashboard_user = "librefang"
dashboard_pass = "librefang"

# ── Terminal Access Control ──────────────────────────────────
# [terminal]
# allow_remote = false                   # false = local-only when no auth configured;
                                         # with API keys/dashboard credentials, remote
                                         # clients can still authenticate and connect
# allow_unauthenticated_remote = false   # hard foot-gun guard: must be true to expose
                                         # an unauthenticated shell when allow_remote=true
# require_proxy_headers = false          # set true only if behind a reverse proxy
                                         # that sets X-Forwarded-For / X-Real-IP
                                         # (old name: trust_proxy_headers)

# ── Performance ──────────────────────────────────────────────
prompt_caching = true           # Reduce LLM costs (Anthropic/OpenAI)
stable_prefix_mode = true       # Improve prompt cache hit rate
usage_footer = "full"           # off | tokens | cost | full

# ── Default LLM ──────────────────────────────────────────────
[default_model]
provider = "{{provider}}"
model = "{{model}}"
api_key_env = "{{api_key_env}}"
# base_url = ""               # Override API endpoint (e.g., local proxy)

# ── Memory ───────────────────────────────────────────────────
[memory]
decay_rate = 0.05               # Memory confidence decay per cycle
# embedding_model = "all-MiniLM-L6-v2"

# ── Proactive Memory (auto-memorize & auto-retrieve) ─────────
[proactive_memory]
enabled = true
auto_memorize = true            # Auto-extract facts from conversations
auto_retrieve = true            # Auto-recall relevant memories
max_retrieve = 10               # Max memories per retrieval
# extraction_threshold = 0.7   # Min confidence to save memory
# session_ttl_hours = 24
# duplicate_threshold = 0.5
# max_memories_per_agent = 1000

# ── Web Tools ────────────────────────────────────────────────
[web]
search_provider = "auto"        # Tavily → Brave → Jina → Perplexity → DuckDuckGo (auto-detect)
# cache_ttl_minutes = 15
# timeout_secs = 15               # 15 for most providers, 30+ recommended for Jina

[web.fetch]
max_chars = 50000               # Max chars extracted from web pages
timeout_secs = 30
readability = true              # Clean HTML → readable text
# ssrf_allowed_hosts = []       # Allow internal hosts/CIDRs (self-hosted/K8s only)
                                # e.g. ["10.0.0.0/8", "*.internal.example.com"]
                                # Cloud metadata (169.254.x.x, 100.64.x.x) always blocked.

# ── Task Queue ───────────────────────────────────────────────
[queue.concurrency]
main_lane = 3                   # Concurrent user messages
cron_lane = 2                   # Concurrent scheduled jobs
subagent_lane = 3               # Concurrent child agents
trigger_lane = 8                # Global cap on in-flight trigger dispatches
default_per_agent = 1           # Per-agent fallback when manifest omits cap
                                # (1 = legacy serial behavior; raise per-agent
                                # via [agents.*] max_concurrent_invocations)

# ── Shell Execution Policy ───────────────────────────────────
[exec_policy]
mode = "deny"                   # deny | allowlist | full
timeout_secs = 30
max_output_bytes = 102400       # 100 KB

# ── Config Hot-Reload ────────────────────────────────────────
[reload]
mode = "hybrid"                 # off | restart | hot | hybrid
debounce_ms = 500

# ── Provider Regions (uncomment to use) ──────────────────────
# [provider_regions]
# qwen = "intl"                # Qwen international endpoint
# minimax = "china"            # MiniMax China endpoint

# ── Provider URL Overrides (uncomment to use) ────────────────
# [provider_urls]
# ollama = "http://127.0.0.1:11434/v1"
# vllm = "http://127.0.0.1:8000/v1"

# ── Fallback Providers (LLM failover chain) ──────────────────
# [[fallback_providers]]
# provider = "openai"
# model = "gpt-4o"
# api_key_env = "OPENAI_API_KEY"

# ── Rate Limiting ────────────────────────────────────────────
# [rate_limit]
# api_requests_per_minute = 500   # GCRA token budget per IP
# retry_after_secs = 60           # Retry-After header value (429 responses)
# max_ws_per_ip = 5               # Max concurrent WebSocket connections per IP
# ws_messages_per_minute = 10     # Max WebSocket messages per minute per connection
# ws_idle_timeout_secs = 1800     # Close idle WebSocket after 30 min
# ws_debounce_ms = 100            # Text delta debounce interval
# ws_debounce_chars = 200         # Flush text buffer at this character count
# ── Registry Sync ────────────────────────────────────────────
# [registry]
# cache_ttl_secs = 86400          # Re-download interval (default: 24 hours)
# ── Session Compaction (LLM-based history summarization) ─────
# [compaction]
# threshold_messages = 30       # Compact when message count exceeds this
# keep_recent = 10              # Recent messages preserved verbatim
# max_summary_tokens = 1024     # Max tokens for the LLM summary
# token_threshold_ratio = 0.7   # Trigger at this fraction of context window
# max_chunk_chars = 80000       # Max chars per summarization chunk
# max_retries = 3               # Max LLM summarization retries
# ── Event Triggers ───────────────────────────────────────────
# [triggers]
# cooldown_secs = 5             # Default cooldown between trigger firings
# max_per_event = 10            # Max triggers that can fire per event
# max_depth = 5                 # Max trigger recursion depth
# max_workflow_secs = 3600      # Max workflow execution time (1 hour)

# ── Budget & Cost Control ────────────────────────────────────
# [budget]
# max_hourly_usd = 0.0         # 0 = unlimited
# max_daily_usd = 0.0
# max_monthly_usd = 0.0
# alert_threshold = 0.8        # Alert at 80% of limit
#
# Per-provider caps: keyed by ModelConfig.provider (e.g. "moonshot",
# "openai", "litellm", "ollama"). 0 = unlimited. Unlisted providers
# inherit no provider-level cap. Use this to throttle paid providers
# while leaving local ones (litellm, ollama) free.
# [budget.providers.moonshot]
# max_cost_per_day_usd = 2.0
# max_tokens_per_hour = 500000
#
# [budget.providers.openai]
# max_cost_per_hour_usd = 1.0
# max_cost_per_month_usd = 50.0

# ── Extended Thinking (Claude models) ────────────────────────
# [thinking]
# budget_tokens = 10000
# stream_thinking = false

# ── Sidecar channel adapters (one block per channel) ─────────
# All channel adapters now run as out-of-process Python sidecars
# speaking newline-delimited JSON-RPC over stdio.
#
# PREREQUISITE — install the LibreFang Python SDK so the daemon
# can spawn the sidecars and so the `python3 -m ...` discovery
# at boot can read each adapter's SCHEMA:
#   pip install librefang-sdk
# Or, from a source checkout:
#   pip install -e sdk/python/
# Make sure you install into the SAME Python interpreter the
# `command = "python3"` lines below will resolve to — daemons
# launched under mise / pyenv / conda often pick a different
# `python3` than the one your shell uses. Verify with
#   python3 -c 'import librefang.sidecar; print(librefang.__file__)'
# from the same shell that starts `librefang`.
#
# Each block below is independent — uncomment only the adapters
# you need. Secrets belong in ~/.librefang/secrets.env, NOT here.
# The full env-var inventory for an adapter lives in its SCHEMA:
#   python3 -m librefang.sidecar.adapters.<name> --describe
#
# (for librefang maintainers only — operators can ignore this)
# Regenerate this listing from each adapter's SCHEMA with
#   cd sdk/python && python3 ../../scripts/gen_sidecar_samples.py
# from a librefang source checkout. Operators do not need to
# run this — the listing is already in your sample file.

